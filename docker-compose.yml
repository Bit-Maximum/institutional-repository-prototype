services:
  db:
    image: postgres:18-alpine
    container_name: ir-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: repository
      POSTGRES_USER: repository
      POSTGRES_PASSWORD: repository
    ports:
      - "5432:5432"
    volumes:
      - ir_postgres:/var/lib/postgresql/data

volumes:
  ir_postgres:
