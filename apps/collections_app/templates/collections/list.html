{% extends "base.html" %}

{% block title %}Коллекции{% endblock %}

{% block content %}
  <h1>Коллекции</h1>
  <ul>
    {% for collection in collections %}
      <li><a href="{% url 'collections:detail' collection.pk %}">{{ collection.name }}</a></li>
    {% empty %}
      <li>Коллекции пока не созданы.</li>
    {% endfor %}
  </ul>
{% endblock %}
