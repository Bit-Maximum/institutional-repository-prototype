{% load i18n %}
<div class="editor-file-widget stack-xs">
  {% if widget.is_initial and not widget.required %}
    <label class="editor-checkbox" for="{{ widget.checkbox_id }}">
      <input type="checkbox" name="{{ widget.checkbox_name }}" id="{{ widget.checkbox_id }}"{% if widget.attrs.disabled %} disabled{% endif %}>
      <span class="editor-checkbox__box" aria-hidden="true"></span>
      <span class="editor-checkbox__label">{{ widget.clear_checkbox_label }}</span>
    </label>
  {% endif %}
  <div class="editor-file-widget__input stack-xs">
    {% if widget.is_initial %}
      <span class="muted">{% trans "Заменить превью" %}:</span>
    {% endif %}
    <input type="{{ widget.type }}" name="{{ widget.name }}"{% include "django/forms/widgets/attrs.html" %}>
  </div>
</div>
