{% extends "base.html" %}

{% block title %}Издания{% endblock %}

{% block content %}
  <h1>Каталог изданий</h1>
  <form method="get">
    <input type="search" name="q" value="{{ request.GET.q }}" placeholder="Поиск по заголовку и аннотации">
    <button type="submit">Найти</button>
  </form>

  <ul>
    {% for publication in publications %}
      <li>
        <a href="{% url 'publications:detail' publication.slug %}">{{ publication.title }}</a>
        — {{ publication.publication_type.name }}
      </li>
    {% empty %}
      <li>Издания не найдены.</li>
    {% endfor %}
  </ul>
{% endblock %}
