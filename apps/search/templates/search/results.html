{% extends "base.html" %}

{% block title %}Поиск{% endblock %}

{% block content %}
  <h1>Поиск</h1>
  <form method="get">
    {{ form.as_p }}
    <button type="submit">Искать</button>
  </form>

  <ul>
    {% for publication in results %}
      <li><a href="{% url 'publications:detail' publication.slug %}">{{ publication.title }}</a></li>
    {% empty %}
      <li>Введите запрос, чтобы получить результаты.</li>
    {% endfor %}
  </ul>
{% endblock %}
